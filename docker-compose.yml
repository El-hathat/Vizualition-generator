version: "3.8"

services:
  superset:
    build: .
    container_name: superset_app

    ports:
      - "8088:8088"

    environment:
      SUPERSET_SECRET_KEY: "SuperSecretKey2026VeryLongAndRandomChangeMe123456789!"
      SQLALCHEMY_DATABASE_URI: "postgresql+psycopg2://superset:superset@db:5432/superset"
      REDIS_HOST: redis
      REDIS_PORT: 6379

    volumes:
      - superset_home:/app/superset_home
      - ./superset_config.py:/app/pythonpath/superset_config.py

    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

    restart: unless-stopped

    command: >
      bash -c "
        pip install psycopg2-binary &&
        superset db upgrade &&
        superset fab create-admin --username admin --firstname Admin --lastname User --email admin@superset.com --password admin || true &&
        superset init &&
        gunicorn -w 2 -k sync -b 0.0.0.0:8088 'superset.app:create_app()'
      "

  db:
    image: postgres:16
    container_name: superset_db

    environment:
      POSTGRES_DB: superset
      POSTGRES_USER: superset
      POSTGRES_PASSWORD: superset

    ports:
      - "5433:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U superset -d superset"]
      interval: 10s
      timeout: 5s
      retries: 20

    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: superset_redis
    restart: unless-stopped

volumes:
  superset_home:
  postgres_data: